# Render Blueprint for Trinetra SEO
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: trinetra-seo
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: SCOPES
        value: read_products,write_products,read_content,write_content,read_online_store_navigation,write_online_store_navigation
      # Secrets — set these in the Render dashboard (sync: false keeps them out of git)
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: DATABASE_URL
        sync: false
