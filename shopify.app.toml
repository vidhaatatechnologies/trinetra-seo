# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

name = "Trinetra SEO"
client_id = "0d23254d6f2c819d19e05d61d849d966"
application_url = "https://trinetra-seo.onrender.com"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products,read_content,write_content,read_online_store_navigation,write_online_store_navigation"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/compliance"
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]

[auth]
redirect_urls = [
  "https://trinetra-seo.onrender.com/auth/callback",
  "https://trinetra-seo.onrender.com/auth/shopify/callback",
  "https://trinetra-seo.onrender.com/api/auth/callback",
]

[build]
automatically_update_urls_on_dev = true
